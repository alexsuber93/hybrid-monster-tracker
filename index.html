<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hybrid Monster">
    <meta name="theme-color" content="#0D0D0D">
    <title>Hybrid Monster Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, san-serif;
            background: #0D0D0D;
            color: #FFFFFF;
        }

        body {
            display: flex;
            flex-direction: column;
            padding-top: max(0px, env(safe-area-inset-top));
            padding-left: max(0px, env(safe-area-inset-left));
            padding-right: max(0px, env(safe-area-inset-right));
            padding-bottom: max(0px, env(safe-area-inset-bottom));
        }

        #app {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px;
            border-bottom: 1px solid #2D2D3F;
            background: #0D0D0D;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 12px;
            color:#999999;
            margin-top: 4px;
            font-weight: 500;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .view {
            display: none;
        }

        .view.active {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Schedule View */
        .schedule-view {
            padding: 16px;
            gap: 16px;
        }

        .phase-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .phase-btn {
            padding: 12px 8px;
            border: 2px solid #2D2D3F;
            background: transparent;
            color: #FdfLD;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .phase-btn:active {
            transform: scale(0.98);
        }

        .phase-btn.active {
            border-color: currentColor;
        }

        .phase-btn[data-phase="1"] {
            color: #0077B6;
        }

        .phase-btn[data-phase="1"].active {
            background: #0077B6;
            color: #FFFFFF;
        }

        .phase-btn[data-phase="2"] {
            color: #F77F00;
        }

        .phase-btn[data-phase="2"].active {
            background: #F7FF00;
            color: #FFFFFF;
        }

        .phase-btn[data-phase="3"] {
            color: #E63946;
        }

        .phase-btn[data-phase="3"].active {
            background: #E4IÀ6;
            color: #FFFFFF;
        }

        .phase-info {
            background: #1A1A2E;
            border: 1px solid #2D2D3F;
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .phase-info-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .phase-info-text {
            color: #CCCCCC;
        }

        .day-cards {
            display: grid;
            gap: 12px;
        }

        .day-card {
            background: #1A1A2E;
            border: 1px solid #2D2D3F;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        .day-card:active {
            transform: scale(0.98);
            background: #2D2D3F;
        }

        .day-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .day-card-icon {
            font-size: 20px;
        }

        .day-card-title {
            font-weight: 600;
            flex: 1;
        }

        .day-card-tag {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            background: #2D2D3F;
            color: #AAAAAA;
        }

        .day-card-desc {
            font-size: 12px;
            color: #999999;
            margin-bottom: 8px;
        }

        .day-card-progress {
            height: 4px;
            background: #2D2D3F;
            border-radius: 2px;
            overflow: hidden;
        }

        .day-card-progress-bar {
            height: 100%;
            background: #0077B6;
            transition: width 0.3s, background-color 0.3s;
            border-radius: 2px;
        }

        .day-card-progress-text {
            font-size: 11px;
            color: #999999;
            margin-top: 4px;
            text-align: right;
        }

        /* Workout View */
        .workout-view {
            padding: 0;
        }

        .workout-header {
            padding: 16px;
            border-bottom: 1px solid #2D2D3F;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: #FFFFFF;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .back-btn:active {
            background: #2D2D3F;
        }

        .workout-day-title {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .workout-day-name {
            font-weight: 700;
            font-size: 16px;
        }

        .workout-day-subtitle {
            font-size: 12px;
            color:#999999;
            margin-top: 2px;
        }

        .workout-progress-bar {
            width: 48px;
            height: 4px;
            background: #2D2D3F;
            border-radius: 2px;
            overflow: hidden;
        }

        .workout-progress-bar-fill {
            height: 100%;
            background: #0077B6;
            transition: width 0.3s, background-color 0.3s;
            border-radius: 2px;
        }

        .workout-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exercise-card {
            background: #1A1A2E;
            border: 1px solid #2D2D3F;
            border-radius: 12px;
            padding: 12px;
            overflow: hidden;
        }

        .exercise-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .exercise-note {
            font-size: 11px;
            color:#999999;
            margin-bottom: 8px;
            font-style: italic;
        }

        .exercise-sets {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 32px 1fr 80px 48px;
            gap: 8px;
            align-items: center;
            background: #0D0D0D;
            padding: 8px;
            border-radius: 8px;
        }

        .set-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2D2D3F;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .set-target {
            font-size: 13px;
            color: #CCCCCC;
        }

        .weight-input {
            padding: 8px;
            background: #2D2D3F;
            border: 1px solid #2D2D3F;
            border-radius: 6px;
            color: #FFFFFF;
            font-size: 13px;
            outline: none;
            -webkit-appearance: none;
            font-weight: 500;
            text-align: right;
        }

        .weight-input:focus {
            border-color: #0077B6;
            background: #1A1A2E;
        }

        .set-done-btn {
            width: 48px;
            height: 32px;
            border: 1.5px solid #2D2D3F;
            background: transparent;
            color: #999999;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .set-done-btn.done {
            background: #0077B6;
            border-color: #0077B6;
            color: #FFFFFF;
        }

        .set-done-btn:active {
            transform: scale(0.95);
        }

        .conditioning-card {
            background: #1A1A2E;
            border: 1px solid #2D2D3F;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 80px;
        }

        .conditioning-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .conditioning-description {
            font-size: 12px;
            color: #CCCCCC;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .conditioning-done-btn {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #2D2D3F;
            background: transparent;
            color: #999999;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .conditioning-done-btn.done {
            background: #0077B6;
            border-color: #0077B6;
            color: #FFFFFF;
        }

        .conditioning-done-btn:active {
            transform: scale(0.98);
        }

        .workout-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: #0D0D0D;
            border-top: 1px solid #2D2D3F;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid #2D2D3F;
            background: transparent;
            color: #FFFFFF;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .nav-btn:active {
            transform: scale(0.98);
        }

        .nav-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar styling */
        .content::-webkit-scrollbar,
        .workout-content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track,
        .workout-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb,
        .workout-content::-webkit-scrollbar-thumb {
            background: #2D2D3F;
            border-radius: 2px;
        }

        @media (max-width: 320px) {
            .set-row {
                grid-template-columns: 28px 1fr 60px 40px;
                gap: 6px;
                padding: 6px;
            }

            .phase-btn {
                font-size: 11px;
                padding: 10px 6px;
            }
        }
    </style>
</head>
