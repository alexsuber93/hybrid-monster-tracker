<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hybrid Monster">
    <meta name="theme-color" content="#0D0D0D">
    <title>Hybrid Monster Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0D0D0D;
            color: #F0EDE6;
        }

        body {
            display: flex;
            flex-direction: column;
            padding-top: max(0px, env(safe-area-inset-top));
            padding-left: max(0px, env(safe-area-inset-left));
            padding-right: max(0px, env(safe-area-inset-right));
            padding-bottom: max(0px, env(safe-area-inset-bottom));
        }

        #app {
            flex: 1;
            display: flex;
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px;
            border-bottom: 1px solid #3A3A3A;
            background: #0D0D0D;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-subtitle {
            font-size: 10px;
            color: #C8973A;
            margin-top: 4px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .view {
            display: none;
        }

        .view.active {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Schedule View */
        .schedule-view {
            padding: 16px;
            gap: 16px;
        }

        .phase-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .phase-btn {
            padding: 12px 8px;
            border: 2px solid #3A3A3A;
            background: transparent;
            color: #F0EDE6;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .phase-btn:active {
            transform: scale(0.98);
        }

        .phase-btn.active {
            border-color: currentColor;
        }

        .phase-btn[data-phase="1"] {
            color: #C8973A;
        }

        .phase-btn[data-phase="1"].active {
            background: #C8973A;
            color: #F0EDE6;
        }

        .phase-btn[data-phase="2"] {
            color: #B07D2E;
        }

        .phase-btn[data-phase="2"].active {
            background: #B07D2E;
            color: #F0EDE6;
        }

        .phase-btn[data-phase="3"] {
            color: #8B6914;
        }

        .phase-btn[data-phase="3"].active {
            background: #8B6914;
            color: #F0EDE6;
        }

        .phase-info {
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .phase-info-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .phase-info-text {
            color: #B0ADA6;
        }

        .day-cards {
            display: grid;
            gap: 12px;
        }

        .day-card {
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        .day-card:active {
            transform: scale(0.98);
            background: #3A3A3A;
        }

        .day-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .day-card-icon {
            font-size: 20px;
        }

        .day-card-title {
            font-weight: 600;
            flex: 1;
        }

        .day-card-tag {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            background: #3A3A3A;
            color: #7A7265;
        }

        .day-card-desc {
            font-size: 12px;
            color: #7A7265;
            margin-bottom: 8px;
        }

        .day-card-progress {
            height: 4px;
            background: #3A3A3A;
            border-radius: 2px;
            overflow: hidden;
        }

        .day-card-progress-bar {
            height: 100%;
            background: #C8973A;
            transition: width 0.3s, background-color 0.3s;
            border-radius: 2px;
        }

        .day-card-progress-text {
            font-size: 11px;
            color: #7A7265;
            margin-top: 4px;
            text-align: right;
        }

        /* Workout View */
        .workout-view {
            padding: 0;
        }

        .workout-header {
            padding: 16px;
            border-bottom: 1px solid #3A3A3A;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: #F0EDE6;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .back-btn:active {
            background: #3A3A3A;
        }

        .workout-day-title {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .workout-day-name {
            font-weight: 700;
            font-size: 16px;
        }

        .workout-day-subtitle {
            font-size: 12px;
            color: #7A7265;
            margin-top: 2px;
        }

        .workout-progress-bar {
            width: 48px;
            height: 4px;
            background: #3A3A3A;
            border-radius: 2px;
            overflow: hidden;
        }

        .workout-progress-bar-fill {
            height: 100%;
            background: #C8973A;
            transition: width 0.3s, background-color 0.3s;
            border-radius: 2px;
        }

        .workout-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exercise-card {
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
            border-radius: 12px;
            padding: 12px;
            overflow: visible;
        }

        .exercise-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .exercise-note {
            font-size: 11px;
            color: #7A7265;
            margin-bottom: 8px;
            font-style: italic;
        }

        .exercise-sets {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 28px 1fr 70px 44px;
            gap: 6px;
            align-items: center;
            background: #0D0D0D;
            padding: 8px;
            border-radius: 8px;
            min-height: 48px;
        }

        .set-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #3A3A3A;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .set-target {
            font-size: 13px;
            color: #B0ADA6;
        }

        .weight-input {
            padding: 8px;
            background: #3A3A3A;
            border: 1px solid #3A3A3A;
            border-radius: 6px;
            color: #F0EDE6;
            font-size: 13px;
            outline: none;
            -webkit-appearance: none;
            font-weight: 500;
            text-align: right;
            min-height: 32px;
            width: 100%;
        }

        .weight-input:focus {
            border-color: #C8973A;
            background: #2A2A2A;
        }

        .set-done-btn {
            width: 48px;
            height: 32px;
            border: 1.5px solid #3A3A3A;
            background: transparent;
            color: #7A7265;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .set-done-btn.done {
            background: #C8973A;
            border-color: #C8973A;
            color: #F0EDE6;
        }

        .set-done-btn:active {
            transform: scale(0.95);
        }

        .conditioning-card {
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 80px;
        }

        .conditioning-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .conditioning-description {
            font-size: 12px;
            color: #B0ADA6;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .conditioning-done-btn {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #3A3A3A;
            background: transparent;
            color: #7A7265;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .conditioning-done-btn.done {
            background: #C8973A;
            border-color: #C8973A;
            color: #F0EDE6;
        }

        .conditioning-done-btn:active {
            transform: scale(0.98);
        }

        .workout-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: #0D0D0D;
            border-top: 1px solid #3A3A3A;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid #3A3A3A;
            background: transparent;
            color: #F0EDE6;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
        }

        .nav-btn:active {
            transform: scale(0.98);
        }

        .nav-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar styling */
        .content::-webkit-scrollbar,
        .workout-content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track,
        .workout-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb,
        .workout-content::-webkit-scrollbar-thumb {
            background: #3A3A3A;
            border-radius: 2px;
        }

        @media (max-width: 320px) {
            .set-row {
                grid-template-columns: 28px 1fr 60px 40px;
                gap: 6px;
                padding: 6px;
            }

            .phase-btn {
                font-size: 11px;
                padding: 10px 6px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="header">
                <div class="header-title">HYBRID MONSTER</div>
                <div class="header-subtitle">Discipline Over Comfort</div>
            </div>

            <div class="content">
                <!-- Schedule View -->

                    <div class="phase-selector" id="phaseSelector"></div>
                    <div id="phaseInfo" class="phase-info">

                        <div class="phase-info-text" id="phaseInfoText"></div>
                    </div>
                    <div class="day-cards" id="dayCards"></div>
                </div>

                <!-- Workout View -->
                <div id="workoutView" class="view">
                    <div class="workout-header">
                        <button class="back-btn" id="backBtn">&#x2190;</button>
                        <div class="workout-day-title">

                        </div>
                        <div class="workout-progress-bar">
                            <div class="workout-progress-bar-fill" id="workoutProgressBar"></div>
                        </div>
                    </div>
                    <div class="workout-content" id="workoutContent"></div>
                    <div class="workout-footer">
                        <button class="nav-btn" id="prevDayBtn">&#x2190; Previous</button>
                        <button class="nav-btn" id="nextDayBtn">Next &#x2192;</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

                },

                        { name: 'DB Incline Curl', sets: '3', reps: '8, 8, max', rest: '60 sec', note: 'Rest-pause last set' },
                        { name: 'CGBP', sets: '3', reps: '8, 6, 4', rest: '90 sec', note: 'Heavy tricep work' },
                        { name: 'DB Skull Crusher \u2014 Drop', sets: '2', reps: '10, drop x2', rest: '60 sec', note: 'Finisher. To failure.' }
                    ],
                    conditioning: { type: 'rower', description: '6 rounds \u2014 5 power cleans + 10 push-ups + 250m row. Target: sub-15 min.' }
                },
                6: {
                    exercises: [
                        { name: 'Bear Complex: Clean+FS+PP+BS+BTN', sets: '5', reps: '3 each', rest: '2 min', note: 'No release.' },
                        { name: 'DB Man Makers', sets: '4', reps: '8', rest: '90 sec', note: 'Heavier than Phase 2' },
                        { name: 'Rower Sprint', sets: '3', reps: '500m', rest: '90 sec', note: 'Beat Phase 2 times' },
                        { name: 'DB Farmer Carry', sets: '3', reps: '60m', rest: '60 sec', note: 'Max weight' }
                    ],
                    conditioning: { type: 'run', description: 'LONG RUN \u2014 50-60 min easy (Zone 2). Peak endurance.' }
                }
            }
        };

        // ============================================================================
        // STATE MANAGEMENT
        // ============================================================================

        let state = {
            currentPhase: 1,
            currentDay: 1,
            view: 'schedule',
            weights: {},
            done: {},
            cond: {}
        };

        function loadState() {
            const weights = localStorage.getItem('hm_weights');
            const done = localStorage.getItem('hm_done');
            const cond = localStorage.getItem('hm_cond');

            if (weights) state.weights = JSON.parse(weights);
            if (done) state.done = JSON.parse(done);
            if (cond) state.cond = JSON.parse(cond);
        }

        function saveState() {
            localStorage.setItem('hm_weights', JSON.stringify(state.weights));
            localStorage.setItem('hm_done', JSON.stringify(state.done));
            localStorage.setItem('hm_cond', JSON.stringify(state.cond));
        }

        function getWeightKey(phase, day, exerciseIndex, setIndex) {
            return `${phase}-${day}-${exerciseIndex}-${setIndex}`;
        }

        function getDoneKey(phase, day, exerciseIndex, setIndex) {
            return `${phase}-${day}-${exerciseIndex}-${setIndex}`;
        }

        function getCondKey(phase, day) {
            return `${phase}-${day}`;
        }

        function calculateDayProgress(phase, day) {
            const workout = WORKOUTS[phase][day];
            if (!workout) return 0;

            let totalSets = 0;
            let doneSets = 0;

            workout.exercises.forEach((ex, exIdx) => {
                const setCount = parseInt(ex.sets) || 0;
                totalSets += setCount;

                for (let setIdx = 0; setIdx < setCount; setIdx++) {
                    const key = getDoneKey(phase, day, exIdx, setIdx);
                    if (state.done[key]) doneSets++;
                }
            });

            const condKey = getCondKey(phase, day);
            const condDone = state.cond[condKey] ? 1 : 0;

            return totalSets + 1 > 0 ? (doneSets + condDone) / (totalSets + 1) : 0;
        }

        // ============================================================================
        // SCHEDULE VIEW
        // ============================================================================

        function renderScheduleView() {
            const phaseSelector = document.getElementById('phaseSelector');
            phaseSelector.innerHTML = '';

            for (let i = 1; i <= 3; i++) {
                const btn = document.createElement('button');
                btn.className = `phase-btn ${state.currentPhase === i ? 'active' : ''}`;
                btn.dataset.phase = i;
                btn.textContent = `Phase ${i}`;
                btn.addEventListener('click', () => selectPhase(i));
                phaseSelector.appendChild(btn);
            }

            const phase = PHASES[state.currentPhase];
            document.getElementById('phaseInfoTitle').textContent = `${phase.name} (Weeks ${phase.weeks})`;
            document.getElementById('phaseInfoText').textContent = phase.description;

            const dayCards = document.getElementById('dayCards');
            dayCards.innerHTML = '';

            for (let day = 1; day <= 6; day++) {
                const dayData = DAYS[day];
                const progress = calculateDayProgress(state.currentPhase, day);
                const progressPercent = Math.round(progress * 100);

                const card = document.createElement('div');
                card.className = 'day-card';
                card.addEventListener('click', () => openWorkout(day));

                const dayOfWeek = WEEKDAYS[day - 1];

                card.innerHTML = `
                    <div class="day-card-header">
                        <div class="day-card-icon">${dayData.icon}</div>
                        <div class="day-card-title">${dayOfWeek} \u2022 ${dayData.name}</div>
                        <div class="day-card-tag">${dayData.tag}</div>
                    </div>
                    <div class="day-card-desc">${dayData.desc}</div>
                    <div class="day-card-progress">
                        <div class="day-card-progress-bar" style="width: ${progressPercent}%; background-color: ${phase.color}"></div>
                    </div>
                    <div class="day-card-progress-text">${progressPercent}% Complete</div>
                `;

                dayCards.appendChild(card);
            }
        }

        function selectPhase(phase) {
            state.currentPhase = phase;
            renderScheduleView();
        }

        function openWorkout(day) {
            state.currentDay = day;
            state.view = 'workout';
            showView('workoutView');
            renderWorkoutView();
        }

        // ============================================================================
        // WORKOUT VIEW
        // ============================================================================

        function renderWorkoutView() {
            const dayData = DAYS[state.currentDay];
            const phase = PHASES[state.currentPhase];
            const workout = WORKOUTS[state.currentPhase][state.currentDay];

            document.getElementById('workoutDayName').textContent = dayData.name;
            document.getElementById('workoutDaySubtitle').textContent = dayData.desc;

            const progress = calculateDayProgress(state.currentPhase, state.currentDay);
            const progressPercent = Math.round(progress * 100);
            document.getElementById('workoutProgressBar').style.width = progressPercent + '%';
            document.getElementById('workoutProgressBar').style.backgroundColor = phase.color;

            const content = document.getElementById('workoutContent');
            content.innerHTML = '';

            // Render exercises
            workout.exercises.forEach((exercise, exIdx) => {
                const card = document.createElement('div');
                card.className = 'exercise-card';

                const header = document.createElement('div');
                header.className = 'exercise-header';
                header.textContent = exercise.name;
                card.appendChild(header);

                if (exercise.note) {
                    const note = document.createElement('div');
                    note.className = 'exercise-note';
                    note.textContent = exercise.note;
                    card.appendChild(note);
                }

                const setsContainer = document.createElement('div');
                setsContainer.className = 'exercise-sets';

                const repsArray = exercise.reps.split(',').map(r => r.trim());
                const setCount = parseInt(exercise.sets) || 0;

                for (let setIdx = 0; setIdx < setCount; setIdx++) {
                    const targetReps = repsArray[setIdx] || repsArray[repsArray.length - 1];
                    const key = getWeightKey(state.currentPhase, state.currentDay, exIdx, setIdx);
                    const doneKey = getDoneKey(state.currentPhase, state.currentDay, exIdx, setIdx);
                    const weight = state.weights[key] || '';
                    const isDone = state.done[doneKey] || false;

                    const row = document.createElement('div');
                    row.className = 'set-row';

                    const setNum = document.createElement('div');
                    setNum.className = 'set-number';
                    setNum.textContent = (setIdx + 1);

                    const target = document.createElement('div');
                    target.className = 'set-target';
                    target.textContent = targetReps;

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'weight-input';
                    input.placeholder = 'lbs';
                    input.value = weight;
                    input.inputMode = 'decimal';
                    input.addEventListener('blur', () => {
                        state.weights[key] = input.value;
                        saveState();
                    });

                    const doneBtn = document.createElement('button');
                    doneBtn.className = `set-done-btn ${isDone ? 'done' : ''}`;
                    doneBtn.textContent = isDone ? '\u2713' : '';
                    doneBtn.addEventListener('click', () => {
                        state.done[doneKey] = !state.done[doneKey];
                        saveState();
                        renderWorkoutView();
                    });

                    row.appendChild(setNum);
                    row.appendChild(target);
                    row.appendChild(input);
                    row.appendChild(doneBtn);

                    setsContainer.appendChild(row);
                }

                card.appendChild(setsContainer);
                content.appendChild(card);
            });

            // Render conditioning
            const cond = workout.conditioning;
            const condCard = document.createElement('div');
            condCard.className = 'conditioning-card';

            const condHeader = document.createElement('div');
            condHeader.className = 'conditioning-header';
            condHeader.innerHTML = `${cond.type === 'rower' ? '\uD83C\uDFCB\uFE0F' : '\uD83C\uDFC3'} ${cond.type.toUpperCase()}`;
            condCard.appendChild(condHeader);

            const condDesc = document.createElement('div');
            condDesc.className = 'conditioning-description';
            condDesc.textContent = cond.description;
            condCard.appendChild(condDesc);

            const condKey = getCondKey(state.currentPhase, state.currentDay);
            const condDone = state.cond[condKey] || false;

            const condBtn = document.createElement('button');
            condBtn.className = `conditioning-done-btn ${condDone ? 'done' : ''}`;
            condBtn.textContent = condDone ? '\u2713 Completed' : 'Mark Complete';
            condBtn.addEventListener('click', () => {
                state.cond[condKey] = !state.cond[condKey];
                saveState();
                renderWorkoutView();
            });
            condCard.appendChild(condBtn);

            content.appendChild(condCard);
        }

        function previousDay() {
            if (state.currentDay > 1) {
                state.currentDay--;
                renderWorkoutView();
            }
        }

        function nextDay() {
            if (state.currentDay < 6) {
                state.currentDay++;
                renderWorkoutView();
            }
        }

        // ============================================================================
        // VIEW MANAGEMENT
        // ============================================================================

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function goBack() {
            state.view = 'schedule';
            showView('scheduleView');
            renderScheduleView();
        }

        // ============================================================================
        // EVENT LISTENERS
        // ============================================================================

        document.getElementById('backBtn').addEventListener('click', goBack);
        document.getElementById('prevDayBtn').addEventListener('click', previousDay);
        document.getElementById('nextDayBtn').addEventListener('click', nextDay);

        // Update nav button disabled states
        function updateNavButtons() {
            const prevBtn = document.getElementById('prevDayBtn');
            const nextBtn = document.getElementById('nextDayBtn');

            if (state.currentDay === 1) {
                prevBtn.classList.add('disabled');
            } else {
                prevBtn.classList.remove('disabled');
            }

            if (state.currentDay === 6) {
                nextBtn.classList.add('disabled');
            } else {
                nextBtn.classList.remove('disabled');
            }
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        function init() {
            loadState();
            renderScheduleView();

            // Observe view changes to update nav buttons
            const observer = new MutationObserver(() => {
                if (state.view === 'workout') {
                    updateNavButtons();
                }
            });

            observer.observe(document.getElementById('workoutContent'), {
                childList: true,
                subtree: true
            });

            updateNavButtons();
        }

        init();
    </script>
